# =============================================================================
# Appium CI — Android + iOS in parallel
# =============================================================================
#
# Runners required (self-hosted on EC2):
#   android  →  EC2 Linux (Ubuntu 22.04, m5.large, KVM enabled)
#               labeled: self-hosted, linux, appium-android
#   ios      →  EC2 Mac   (mac2.metal, macOS 13+)
#               labeled: self-hosted, macos, appium-ios
#
# One-time EC2 setup: see ci/setup-android-runner.sh and ci/setup-ios-runner.sh
# =============================================================================

name: Appium Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:       # allows manual trigger from the GitHub Actions UI

jobs:

  # ── Android tests (EC2 Linux + KVM) ───────────────────────────────────────
  android:
    name: Android Emulator Tests
    runs-on: [self-hosted, linux, appium-android]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Boot the emulator ──────────────────────────────────────────────────
      - name: Start Android emulator
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-$HOME/android-sdk}"
          export PATH="$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"

          # Create AVD if it doesn't exist yet
          if ! emulator -list-avds 2>/dev/null | grep -q "CIDevice"; then
            echo "no" | avdmanager \
              --sdk_root="$ANDROID_HOME" \
              create avd \
              --name "CIDevice" \
              --package "system-images;android-36;google_apis;arm64-v8a" \
              --device "pixel_6" \
              --force
          fi

          # Start headless (KVM-accelerated)
          nohup emulator \
            -avd CIDevice \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -no-snapshot-save \
            -accel on \
            > /tmp/emulator.log 2>&1 &

          # Wait for full boot (max 5 min)
          echo "Waiting for emulator boot..."
          timeout 300 bash -c '
            until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do
              sleep 5
            done
          '
          adb shell input keyevent 82   # unlock screen
          echo "Emulator ready: $(adb devices | grep emulator)"

      # ── Start Appium ───────────────────────────────────────────────────────
      - name: Start Appium server
        run: |
          export APPIUM_HOME="${APPIUM_HOME:-$HOME/.appium}"
          nohup appium \
            --port 4723 \
            --address 127.0.0.1 \
            --base-path / \
            --relaxed-security \
            --log-level warn \
            > /tmp/appium.log 2>&1 &

          # Wait until ready
          timeout 30 bash -c '
            until curl -sf http://localhost:4723/status 2>/dev/null | grep -q "\"ready\":true"; do
              sleep 2
            done
          '
          echo "Appium ready"

      # ── Run tests ──────────────────────────────────────────────────────────
      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Run Android tests
        working-directory: tests
        env:
          APPIUM_HOST: localhost
          APPIUM_PORT: "4723"
        run: npm run test:android

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Stop Appium and emulator
        if: always()
        run: |
          pkill -f "appium" 2>/dev/null || true
          adb emu kill 2>/dev/null || true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshots
          path: tests/screenshots/
          retention-days: 7

  # ── iOS tests (EC2 Mac) ────────────────────────────────────────────────────
  ios:
    name: iOS Simulator Tests
    runs-on: [self-hosted, macos, appium-ios]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Boot the simulator ─────────────────────────────────────────────────
      - name: Start iOS Simulator
        run: |
          # Find best available iPhone simulator
          SIM_UDID=""
          for MODEL in "iPhone 16" "iPhone 15 Pro" "iPhone 15" "iPhone 14"; do
            SIM_UDID=$(xcrun simctl list devices available 2>/dev/null \
              | grep "$MODEL" \
              | grep -oE '[A-F0-9]{8}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{12}' \
              | head -1 || true)
            [ -n "$SIM_UDID" ] && { echo "Using $MODEL ($SIM_UDID)"; break; }
          done

          if [ -z "$SIM_UDID" ]; then
            echo "No iPhone simulator found — check Xcode runtime installations"
            xcrun simctl list devices available
            exit 1
          fi

          # Boot (no-op if already booted)
          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true

          # Wait for boot (max 90 s)
          timeout 90 bash -c "
            until xcrun simctl list devices booted 2>/dev/null | grep -q '$SIM_UDID'; do
              sleep 3
            done
          "

          # Persist UDID for subsequent steps
          echo "IOS_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          echo "Simulator ready: $SIM_UDID"

      # ── Start Appium ───────────────────────────────────────────────────────
      - name: Start Appium server
        run: |
          export APPIUM_HOME="${APPIUM_HOME:-$HOME/.appium}"
          nohup appium \
            --port 4723 \
            --address 127.0.0.1 \
            --base-path / \
            --relaxed-security \
            --log-level warn \
            > /tmp/appium.log 2>&1 &

          timeout 30 bash -c '
            until curl -sf http://localhost:4723/status 2>/dev/null | grep -q "\"ready\":true"; do
              sleep 2
            done
          '
          echo "Appium ready"

      # ── Run tests ──────────────────────────────────────────────────────────
      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Run iOS tests
        working-directory: tests
        env:
          APPIUM_HOST: localhost
          APPIUM_PORT: "4723"
          IOS_UDID: ${{ env.IOS_UDID }}
        run: npm run test:ios

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Stop Appium
        if: always()
        run: pkill -f "appium" 2>/dev/null || true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: tests/screenshots/
          retention-days: 7

  # ── Final status badge ─────────────────────────────────────────────────────
  report:
    name: Results
    runs-on: ubuntu-latest
    needs: [android, ios]
    if: always()
    steps:
      - name: Check results
        run: |
          ANDROID="${{ needs.android.result }}"
          IOS="${{ needs.ios.result }}"
          echo "Android: $ANDROID"
          echo "iOS:     $IOS"
          if [[ "$ANDROID" != "success" || "$IOS" != "success" ]]; then
            echo "One or more test jobs failed."
            exit 1
          fi
          echo "All tests passed."
